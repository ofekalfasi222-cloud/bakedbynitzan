<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול קטלוג | ניצן - משהו מתוק</title>
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Heebo', sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }

    /* Login */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-box { background: #fff; border-radius: 16px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
    .login-box img { width: 80px; margin-bottom: 16px; }
    .login-box h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .login-box p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; font-family: inherit; margin-bottom: 12px; direction: ltr; text-align: left; }
    .login-box input:focus { outline: none; border-color: #000; }
    .login-box button { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .login-box button:hover { background: #333; }
    .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 8px; display: none; }

    /* Admin Layout */
    .admin-layout { display: none; }
    .admin-header { background: #000; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .admin-header h1 { font-size: 1.1rem; font-weight: 700; }
    .admin-header-actions { display: flex; gap: 12px; align-items: center; }
    .btn-logout { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
    .btn-logout:hover { background: rgba(255,255,255,0.1); }
    .btn-back-site { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; }
    .btn-back-site:hover { color: #fff; }

    /* Content */
    .admin-content { max-width: 900px; margin: 0 auto; padding: 24px; }

    /* Top bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top-bar h2 { font-size: 1.3rem; }
    .btn-add { display: flex; align-items: center; gap: 6px; background: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-add:hover { background: #333; }

    /* Product List */
    .product-list { display: flex; flex-direction: column; gap: 12px; }
    .product-item { background: #fff; border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .product-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .product-item-info { flex: 1; min-width: 0; }
    .product-item-info h3 { font-size: 1rem; margin-bottom: 4px; }
    .product-item-info p { font-size: 0.85rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-item-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .product-item-price { font-weight: 700; font-size: 1.1rem; white-space: nowrap; }
    .product-item-badge { background: #f0f0f0; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
    .product-item-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-edit, .btn-delete { border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .btn-edit { background: #e8f4ff; color: #0066cc; }
    .btn-edit:hover { background: #d0e8ff; }
    .btn-delete { background: #ffe8e8; color: #cc0000; }
    .btn-delete:hover { background: #ffd0d0; }

    /* Modal / Form */
    .form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .form-overlay.active { display: flex; }
    .form-box { background: #fff; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 32px; }
    .form-box h2 { margin-bottom: 20px; font-size: 1.2rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem; font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #000; }

    /* Image upload */
    .image-upload { position: relative; }
    .image-upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: 0.2s; }
    .image-upload-area:hover { border-color: #999; background: #fafafa; }
    .image-upload-area.has-image { padding: 8px; }
    .image-upload-area img { max-width: 100%; max-height: 200px; border-radius: 8px; }
    .image-upload-area p { color: #999; font-size: 0.9rem; }
    .image-upload input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .form-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-save { flex: 1; padding: 14px; background: #000; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-save:hover { background: #333; }
    .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    .btn-cancel { flex: 1; padding: 14px; background: #f0f0f0; color: #333; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-cancel:hover { background: #e0e0e0; }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: #888; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #ddd; border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 0.9rem; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-state p { font-size: 1.1rem; margin-bottom: 16px; }

    /* Responsive */
    @media (max-width: 600px) {
      .product-item { flex-wrap: wrap; }
      .product-item img { width: 60px; height: 60px; }
      .product-item-meta { width: 100%; justify-content: space-between; }
      .form-box { padding: 20px; }
      .admin-content { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <img src="images/logo.png" alt="ניצן">
      <h1>ניהול הקטלוג</h1>
      <p>כניסה למנהלת בלבד</p>
      <input type="email" id="loginEmail" placeholder="אימייל" autocomplete="email">
      <input type="password" id="loginPassword" placeholder="סיסמה" autocomplete="current-password">
      <button id="loginBtn">כניסה</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- Admin Layout -->
  <div class="admin-layout" id="adminLayout">
    <header class="admin-header">
      <h1>ניהול קטלוג - ניצן משהו מתוק</h1>
      <div class="admin-header-actions">
        <a href="index.html" class="btn-back-site" target="_blank">צפייה באתר</a>
        <button class="btn-logout" id="logoutBtn">התנתקות</button>
      </div>
    </header>

    <div class="admin-content">
      <div class="top-bar">
        <h2>המוצרים שלי</h2>
        <button class="btn-add" id="addProductBtn">+ מוצר חדש</button>
      </div>

      <div class="loading" id="loadingProducts">
        <span class="spinner"></span> טוען מוצרים...
      </div>

      <div class="empty-state" id="emptyState" style="display:none;">
        <p>אין מוצרים עדיין</p>
        <button class="btn-add" onclick="openForm()">+ הוסיפי מוצר ראשון</button>
      </div>

      <div class="product-list" id="productList"></div>
    </div>
  </div>

  <!-- Product Form Modal -->
  <div class="form-overlay" id="formOverlay">
    <div class="form-box">
      <h2 id="formTitle">מוצר חדש</h2>

      <div class="form-group">
        <label>שם המוצר *</label>
        <input type="text" id="prodName" placeholder="למשל: אלפחורס">
      </div>

      <div class="form-group">
        <label>קטגוריה *</label>
        <select id="prodCategory">
          <option value="cookies">עוגיות</option>
          <option value="boxes">מארזים</option>
          <option value="cakes">עוגות</option>
          <option value="desserts">קינוחים</option>
        </select>
      </div>

      <div class="form-group">
        <label>מחיר (בש"ח) *</label>
        <input type="number" id="prodPrice" placeholder="60" min="0" dir="ltr">
      </div>

      <div class="form-group">
        <label>תיאור</label>
        <textarea id="prodDescription" placeholder="תיאור קצר של המוצר..."></textarea>
      </div>

      <div class="form-group">
        <label>תגית (אופציונלי)</label>
        <input type="text" id="prodBadge" placeholder="למשל: פופולרי, הנמכר ביותר, VIP">
      </div>

      <div class="form-group">
        <label>תמונה *</label>
        <div class="image-upload">
          <div class="image-upload-area" id="imageUploadArea">
            <p>לחצי כאן להעלאת תמונה</p>
          </div>
          <input type="file" id="prodImage" accept="image/*">
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-save" id="saveBtn">שמירה</button>
        <button class="btn-cancel" id="cancelBtn">ביטול</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="cloudinary-config.js"></script>

  <script>
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CATEGORIES = {
      cookies: 'עוגיות',
      boxes: 'מארזים',
      cakes: 'עוגות',
      desserts: 'קינוחים'
    };

    let editingId = null;
    let currentImageFile = null;
    let currentImageUrl = null;

    // --- Auth ---

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminLayout').style.display = 'block';
        loadProducts();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminLayout').style.display = 'none';
      }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent = 'נא למלא אימייל וסיסמה';
        errorEl.style.display = 'block';
        return;
      }

      try {
        await auth.signInWithEmailAndPassword(email, password);
      } catch (err) {
        errorEl.textContent = 'אימייל או סיסמה שגויים';
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('loginPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());

    // --- Products CRUD ---

    async function loadProducts() {
      const listEl = document.getElementById('productList');
      const loadingEl = document.getElementById('loadingProducts');
      const emptyEl = document.getElementById('emptyState');

      loadingEl.style.display = 'block';
      listEl.innerHTML = '';
      emptyEl.style.display = 'none';

      try {
        const snapshot = await db.collection('products').orderBy('order', 'asc').get();

        loadingEl.style.display = 'none';

        if (snapshot.empty) {
          emptyEl.style.display = 'block';
          return;
        }

        snapshot.forEach(doc => {
          const product = { id: doc.id, ...doc.data() };
          listEl.appendChild(createProductItem(product));
        });
      } catch (err) {
        loadingEl.innerHTML = '<p style="color:#e74c3c;">שגיאה בטעינת מוצרים. בדקי את הגדרות Firebase.</p>';
        console.error(err);
      }
    }

    function createProductItem(product) {
      const item = document.createElement('div');
      item.className = 'product-item';
      item.innerHTML = `
        <img src="${product.image || 'images/logo.png'}" alt="${product.name}">
        <div class="product-item-info">
          <h3>${product.name}</h3>
          <p>${product.description || ''}</p>
        </div>
        <div class="product-item-meta">
          <span class="product-item-price">${product.price} &#8362;</span>
          ${product.badge ? `<span class="product-item-badge">${product.badge}</span>` : ''}
        </div>
        <div class="product-item-actions">
          <button class="btn-edit" title="עריכה" onclick="editProduct('${product.id}')">&#9998;</button>
          <button class="btn-delete" title="מחיקה" onclick="deleteProduct('${product.id}', '${product.name}')">&#128465;</button>
        </div>
      `;
      return item;
    }

    // --- Form ---

    function openForm(product = null) {
      editingId = product ? product.id : null;
      currentImageFile = null;
      currentImageUrl = product ? product.image : null;

      document.getElementById('formTitle').textContent = product ? 'עריכת מוצר' : 'מוצר חדש';
      document.getElementById('prodName').value = product ? product.name : '';
      document.getElementById('prodCategory').value = product ? product.category : 'cookies';
      document.getElementById('prodPrice').value = product ? product.price : '';
      document.getElementById('prodDescription').value = product ? product.description || '' : '';
      document.getElementById('prodBadge').value = product ? product.badge || '' : '';

      const uploadArea = document.getElementById('imageUploadArea');
      if (product && product.image) {
        uploadArea.innerHTML = `<img src="${product.image}" alt="תמונה"><p>לחצי להחלפת תמונה</p>`;
        uploadArea.classList.add('has-image');
      } else {
        uploadArea.innerHTML = '<p>לחצי כאן להעלאת תמונה</p>';
        uploadArea.classList.remove('has-image');
      }

      document.getElementById('prodImage').value = '';
      document.getElementById('formOverlay').classList.add('active');
    }

    document.getElementById('addProductBtn').addEventListener('click', () => openForm());
    document.getElementById('cancelBtn').addEventListener('click', closeForm);
    document.getElementById('formOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('formOverlay')) closeForm();
    });

    function closeForm() {
      document.getElementById('formOverlay').classList.remove('active');
      editingId = null;
      currentImageFile = null;
    }

    // Image preview
    document.getElementById('prodImage').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      currentImageFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        const uploadArea = document.getElementById('imageUploadArea');
        uploadArea.innerHTML = `<img src="${e.target.result}" alt="תצוגה מקדימה"><p>לחצי להחלפת תמונה</p>`;
        uploadArea.classList.add('has-image');
      };
      reader.readAsDataURL(file);
    });

    // Cloudinary upload
    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', cloudinaryConfig.uploadPreset);
      formData.append('folder', 'baked-by-nitzan');

      const res = await fetch(
        `https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/image/upload`,
        { method: 'POST', body: formData }
      );

      if (!res.ok) throw new Error('שגיאה בהעלאת תמונה');
      const data = await res.json();
      return data.secure_url;
    }

    // Save
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const name = document.getElementById('prodName').value.trim();
      const category = document.getElementById('prodCategory').value;
      const price = parseInt(document.getElementById('prodPrice').value);
      const description = document.getElementById('prodDescription').value.trim();
      const badge = document.getElementById('prodBadge').value.trim();

      if (!name || !category || !price) {
        showToast('נא למלא שם, קטגוריה ומחיר');
        return;
      }

      if (!editingId && !currentImageFile && !currentImageUrl) {
        showToast('נא להעלות תמונה');
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'שומר...';

      try {
        let imageUrl = currentImageUrl;

        if (currentImageFile) {
          imageUrl = await uploadToCloudinary(currentImageFile);
        }

        const productData = {
          name,
          category,
          categoryLabel: CATEGORIES[category],
          price,
          description,
          badge: badge || null,
          image: imageUrl,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (editingId) {
          await db.collection('products').doc(editingId).update(productData);
          showToast('המוצר עודכן בהצלחה!');
        } else {
          const snapshot = await db.collection('products').get();
          productData.order = snapshot.size + 1;
          productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection('products').add(productData);
          showToast('מוצר חדש נוסף בהצלחה!');
        }

        closeForm();
        loadProducts();
      } catch (err) {
        console.error(err);
        showToast('שגיאה בשמירה: ' + err.message);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'שמירה';
      }
    });

    // Edit
    async function editProduct(id) {
      try {
        const doc = await db.collection('products').doc(id).get();
        if (doc.exists) {
          openForm({ id: doc.id, ...doc.data() });
        }
      } catch (err) {
        showToast('שגיאה בטעינת המוצר');
      }
    }

    // Delete
    async function deleteProduct(id, name) {
      if (!confirm(`למחוק את "${name}"?`)) return;
      try {
        await db.collection('products').doc(id).delete();
        showToast('המוצר נמחק');
        loadProducts();
      } catch (err) {
        showToast('שגיאה במחיקה');
      }
    }

    // Toast
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
