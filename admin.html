<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ניהול קטלוג | ניצן - משהו מתוק</title>
  <link rel="icon" href="images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Heebo', sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }

    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-box { background: #fff; border-radius: 16px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
    .login-box img { width: 80px; margin-bottom: 16px; }
    .login-box h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .login-box p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; font-family: inherit; margin-bottom: 12px; }
    .login-box input:focus { outline: none; border-color: #000; }
    .login-box button { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .login-box button:hover { background: #333; }
    .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 8px; display: none; }

    .admin-layout { display: none; }
    .admin-header { background: #000; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .admin-header h1 { font-size: 1.1rem; font-weight: 700; }
    .admin-header-actions { display: flex; gap: 12px; align-items: center; }
    .btn-logout { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
    .btn-back-site { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; }

    .admin-content { max-width: 900px; margin: 0 auto; padding: 24px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .top-bar h2 { font-size: 1.3rem; }
    .btn-add { display: flex; align-items: center; gap: 6px; background: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-add:hover { background: #333; }

    .product-list { display: flex; flex-direction: column; gap: 12px; }
    .product-item { background: #fff; border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .product-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .product-item-info { flex: 1; min-width: 0; }
    .product-item-info h3 { font-size: 1rem; margin-bottom: 4px; }
    .product-item-info p { font-size: 0.85rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-item-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .product-item-price { font-weight: 700; font-size: 1.1rem; white-space: nowrap; }
    .product-item-badge { background: #f0f0f0; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
    .product-item-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-edit, .btn-delete { border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .btn-edit { background: #e8f4ff; color: #0066cc; }
    .btn-delete { background: #ffe8e8; color: #cc0000; }

    .form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .form-overlay.active { display: flex; }
    .form-box { background: #fff; border-radius: 16px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 32px; }
    .form-box h2 { margin-bottom: 20px; font-size: 1.2rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem; font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #000; }

    .image-upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; position: relative; overflow: hidden; }
    .image-upload-area:hover { border-color: #999; background: #fafafa; }
    .image-upload-area.has-image { padding: 8px; }
    .image-upload-area img { max-width: 100%; max-height: 200px; border-radius: 8px; }
    .image-upload-area p { color: #999; font-size: 0.9rem; }
    .image-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    .form-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-save { flex: 1; padding: 14px; background: #000; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    .btn-cancel { flex: 1; padding: 14px; background: #f0f0f0; color: #333; border: none; border-radius: 10px; font-size: 1rem; font-weight: 500; cursor: pointer; font-family: inherit; }

    .saving-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 300; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
    .saving-overlay.active { display: flex; }
    .spinner { width: 32px; height: 32px; border: 3px solid #ddd; border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 0.9rem; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-state p { font-size: 1.1rem; margin-bottom: 16px; }

    @media (max-width: 600px) {
      .product-item { flex-wrap: wrap; }
      .product-item img { width: 60px; height: 60px; }
      .product-item-meta { width: 100%; justify-content: space-between; }
      .form-box { padding: 20px; }
      .admin-content { padding: 16px; }
    }
  </style>
</head>
<body>

  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <img src="images/logo.png" alt="ניצן">
      <h1>ניהול הקטלוג</h1>
      <p>כניסה למנהלת בלבד</p>
      <input type="password" id="loginPassword" placeholder="סיסמה">
      <input type="password" id="loginToken" placeholder="מפתח GitHub (פעם ראשונה בלבד)" style="display:none;">
      <button id="loginBtn">כניסה</button>
      <div class="login-error" id="loginError">סיסמה שגויה</div>
      <a href="#" id="resetTokenLink" style="display:none; color:#999; font-size:0.8rem; margin-top:12px; text-decoration:underline; cursor:pointer;">איפוס מפתח</a>
    </div>
  </div>

  <div class="admin-layout" id="adminLayout">
    <header class="admin-header">
      <h1>ניהול קטלוג - ניצן משהו מתוק</h1>
      <div class="admin-header-actions">
        <a href="index.html" class="btn-back-site" target="_blank">צפייה באתר</a>
        <button class="btn-logout" id="logoutBtn">התנתקות</button>
      </div>
    </header>
    <div class="admin-content">
      <div class="top-bar">
        <h2>המוצרים שלי</h2>
        <button class="btn-add" id="addProductBtn">+ מוצר חדש</button>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <p>אין מוצרים עדיין</p>
      </div>
      <div class="product-list" id="productList"></div>
    </div>
  </div>

  <div class="form-overlay" id="formOverlay">
    <div class="form-box">
      <h2 id="formTitle">מוצר חדש</h2>
      <div class="form-group">
        <label>שם המוצר *</label>
        <input type="text" id="prodName" placeholder="למשל: אלפחורס">
      </div>
      <div class="form-group">
        <label>קטגוריה *</label>
        <select id="prodCategory">
          <option value="cookies">עוגיות</option>
          <option value="boxes">מארזים</option>
          <option value="cakes">עוגות</option>
          <option value="desserts">קינוחים</option>
        </select>
      </div>
      <div class="form-group">
        <label>מחיר (בש"ח) *</label>
        <input type="number" id="prodPrice" placeholder="60" min="0" dir="ltr">
      </div>
      <div class="form-group">
        <label>תיאור</label>
        <textarea id="prodDescription" placeholder="תיאור קצר של המוצר..."></textarea>
      </div>
      <div class="form-group">
        <label>תגית (אופציונלי)</label>
        <input type="text" id="prodBadge" placeholder="למשל: פופולרי, VIP">
      </div>
      <div class="form-group">
        <label>תמונה *</label>
        <div class="image-upload-area" id="imageUploadArea">
          <p>לחצי כאן להעלאת תמונה</p>
          <input type="file" id="prodImage" accept="image/*">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-save" id="saveBtn">שמירה</button>
        <button class="btn-cancel" id="cancelBtn">ביטול</button>
      </div>
    </div>
  </div>

  <div class="saving-overlay" id="savingOverlay">
    <div class="spinner"></div>
    <p>שומר שינויים...</p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const REPO_OWNER = 'ofekalfasi222-cloud';
    const REPO_NAME = 'bakedbynitzan';
    const ADMIN_PASSWORD = 'nitzan2026';
    let GITHUB_TOKEN = localStorage.getItem('gh_token') || '';

    const CATEGORIES = { cookies: 'עוגיות', boxes: 'מארזים', cakes: 'עוגות', desserts: 'קינוחים' };

    let products = [];
    let productsSha = null;
    let editingIndex = null;
    let currentImageFile = null;
    let currentImageDataUrl = null;

    // --- Auth ---
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    document.getElementById('logoutBtn').addEventListener('click', () => { location.reload(); });

    if (!GITHUB_TOKEN) {
      document.getElementById('loginToken').style.display = 'block';
    } else {
      document.getElementById('resetTokenLink').style.display = 'inline-block';
    }

    document.getElementById('resetTokenLink').addEventListener('click', e => {
      e.preventDefault();
      localStorage.removeItem('gh_token');
      GITHUB_TOKEN = '';
      document.getElementById('loginToken').style.display = 'block';
      document.getElementById('loginToken').value = '';
      document.getElementById('resetTokenLink').style.display = 'none';
      showToast('מפתח אופס - הכניסי מפתח חדש');
    });

    function login() {
      const pwd = document.getElementById('loginPassword').value;
      const tokenInput = document.getElementById('loginToken').value.trim();
      const errorEl = document.getElementById('loginError');

      if (pwd !== ADMIN_PASSWORD) {
        errorEl.textContent = 'סיסמה שגויה';
        errorEl.style.display = 'block';
        return;
      }

      if (!GITHUB_TOKEN && !tokenInput) {
        errorEl.textContent = 'נא להזין מפתח GitHub (פעם ראשונה בלבד)';
        errorEl.style.display = 'block';
        return;
      }

      if (tokenInput) {
        GITHUB_TOKEN = tokenInput;
        localStorage.setItem('gh_token', tokenInput);
      }

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminLayout').style.display = 'block';
      loadProducts();
    }

    // --- GitHub API ---
    async function ghFetch(path, options = {}) {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/${path}`, {
        ...options,
        headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json', ...options.headers }
      });
      return res;
    }

    function utf8Base64Decode(base64) {
      const raw = atob(base64.replace(/\n/g, ''));
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    function utf8Base64Encode(str) {
      const bytes = new TextEncoder().encode(str);
      let binary = '';
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary);
    }

    async function loadProducts() {
      try {
        const res = await ghFetch('contents/products.json');
        if (res.status === 401 || res.status === 403) {
          localStorage.removeItem('gh_token');
          GITHUB_TOKEN = '';
          document.getElementById('adminLayout').style.display = 'none';
          document.getElementById('loginScreen').style.display = 'flex';
          document.getElementById('loginToken').style.display = 'block';
          document.getElementById('resetTokenLink').style.display = 'none';
          showToast('מפתח לא תקין - הכניסי מפתח חדש');
          return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        productsSha = data.sha;
        products = JSON.parse(utf8Base64Decode(data.content));
        renderProductList();
      } catch (err) {
        console.error('Load error:', err);
        showToast('שגיאה בטעינת מוצרים: ' + err.message);
      }
    }

    async function saveProducts() {
      document.getElementById('savingOverlay').classList.add('active');
      try {
        const content = utf8Base64Encode(JSON.stringify(products, null, 2));
        const res = await ghFetch('contents/products.json', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Update products from admin panel', content, sha: productsSha })
        });
        if (!res.ok) {
          const errData = await res.json();
          throw new Error(errData.message || 'HTTP ' + res.status);
        }
        const data = await res.json();
        productsSha = data.content.sha;
        showToast('נשמר בהצלחה! השינויים יעלו תוך דקה');
      } catch (err) {
        console.error('Save error:', err);
        showToast('שגיאה בשמירה: ' + err.message);
      }
      document.getElementById('savingOverlay').classList.remove('active');
    }

    async function uploadImageToGithub(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
          try {
            const base64 = reader.result.split(',')[1];
            const timestamp = Date.now();
            const ext = file.name.split('.').pop().toLowerCase();
            const filename = `images/product-${timestamp}.${ext}`;

            const res = await ghFetch(`contents/${filename}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: `Add product image ${filename}`, content: base64 })
            });
            const data = await res.json();
            resolve(filename);
          } catch (err) { reject(err); }
        };
        reader.readAsDataURL(file);
      });
    }

    // --- Product List ---
    function renderProductList() {
      const list = document.getElementById('productList');
      const empty = document.getElementById('emptyState');
      list.innerHTML = '';

      if (products.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      products.forEach((p, i) => {
        const item = document.createElement('div');
        item.className = 'product-item';
        item.innerHTML = `
          <img src="${p.image}" alt="${p.name}" onerror="this.src='images/logo.png'">
          <div class="product-item-info"><h3>${p.name}</h3><p>${p.description || ''}</p></div>
          <div class="product-item-meta">
            <span class="product-item-price">${p.price} &#8362;</span>
            ${p.badge ? `<span class="product-item-badge">${p.badge}</span>` : ''}
          </div>
          <div class="product-item-actions">
            <button class="btn-edit" onclick="openForm(${i})">&#9998;</button>
            <button class="btn-delete" onclick="deleteProduct(${i})">&#128465;</button>
          </div>
        `;
        list.appendChild(item);
      });
    }

    // --- Form ---
    document.getElementById('addProductBtn').addEventListener('click', () => openForm());
    document.getElementById('cancelBtn').addEventListener('click', closeForm);
    document.getElementById('formOverlay').addEventListener('click', e => { if (e.target.id === 'formOverlay') closeForm(); });

    function openForm(index = null) {
      editingIndex = index;
      currentImageFile = null;
      currentImageDataUrl = null;
      const p = index !== null ? products[index] : null;

      document.getElementById('formTitle').textContent = p ? 'עריכת מוצר' : 'מוצר חדש';
      document.getElementById('prodName').value = p ? p.name : '';
      document.getElementById('prodCategory').value = p ? p.category : 'cookies';
      document.getElementById('prodPrice').value = p ? p.price : '';
      document.getElementById('prodDescription').value = p ? (p.description || '') : '';
      document.getElementById('prodBadge').value = p ? (p.badge || '') : '';

      const area = document.getElementById('imageUploadArea');
      if (p && p.image) {
        area.innerHTML = `<img src="${p.image}" alt="תמונה"><p>לחצי להחלפה</p><input type="file" id="prodImage" accept="image/*">`;
      } else {
        area.innerHTML = '<p>לחצי כאן להעלאת תמונה</p><input type="file" id="prodImage" accept="image/*">';
      }
      area.classList.toggle('has-image', !!(p && p.image));

      document.getElementById('prodImage').addEventListener('change', handleImageSelect);
      document.getElementById('formOverlay').classList.add('active');
    }

    function closeForm() { document.getElementById('formOverlay').classList.remove('active'); }

    function handleImageSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      currentImageFile = file;
      const reader = new FileReader();
      reader.onload = ev => {
        currentImageDataUrl = ev.target.result;
        const area = document.getElementById('imageUploadArea');
        area.innerHTML = `<img src="${ev.target.result}" alt="תצוגה מקדימה"><p>לחצי להחלפה</p><input type="file" id="prodImage" accept="image/*">`;
        area.classList.add('has-image');
        document.getElementById('prodImage').addEventListener('change', handleImageSelect);
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const name = document.getElementById('prodName').value.trim();
      const category = document.getElementById('prodCategory').value;
      const price = parseInt(document.getElementById('prodPrice').value);
      const description = document.getElementById('prodDescription').value.trim();
      const badge = document.getElementById('prodBadge').value.trim();

      if (!name || !category || !price) { showToast('נא למלא שם, קטגוריה ומחיר'); return; }
      if (editingIndex === null && !currentImageFile && !(products[editingIndex]?.image)) { showToast('נא להעלות תמונה'); return; }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'שומר...';

      try {
        let image = editingIndex !== null ? products[editingIndex].image : '';

        if (currentImageFile) {
          image = await uploadImageToGithub(currentImageFile);
        }

        const productData = {
          id: editingIndex !== null ? products[editingIndex].id : Date.now(),
          name, category, categoryLabel: CATEGORIES[category],
          price, description, image,
          badge: badge || undefined
        };

        if (editingIndex !== null) {
          products[editingIndex] = productData;
        } else {
          products.push(productData);
        }

        await saveProducts();
        closeForm();
        renderProductList();
      } catch (err) {
        console.error(err);
        showToast('שגיאה בשמירה: ' + err.message);
      }

      saveBtn.disabled = false;
      saveBtn.textContent = 'שמירה';
    });

    function deleteProduct(index) {
      if (!confirm(`למחוק את "${products[index].name}"?`)) return;
      products.splice(index, 1);
      saveProducts();
      renderProductList();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
